[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "createcart-delivery"
version = "0.1.0"
description = "CreateCart Delivery SDK — order lifecycle state machine (placed → confirmed → preparing → out for delivery → delivered) with a status timeline."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "CreateCart" }]
license = { text = "Proprietary" }
dependencies = [
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/createcart_delivery"]

[tool.pytest.ini_options]
testpaths = ["tests"]
