[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "createcart-registry"
version = "0.1.0"
description = "CreateCart Menu Registry SDK — headless, pluggable menu management for ecommerce apps."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "CreateCart" }]
license = { text = "Proprietary" }
dependencies = [
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/createcart_registry"]

[tool.pytest.ini_options]
testpaths = ["tests"]
