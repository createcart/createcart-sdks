[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "createcart-notify"
version = "0.1.0"
description = "CreateCart Notify SDK — pluggable SMS/WhatsApp notifications (Twilio + Console) for order status follow-ups."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "CreateCart" }]
license = { text = "Proprietary" }
dependencies = [
    "pydantic>=2.6",
]
# Twilio is called via its REST API (urllib) — no `twilio` pip package needed.

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/createcart_notify"]

[tool.pytest.ini_options]
testpaths = ["tests"]
